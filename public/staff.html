<!DOCTYPE html>
<html>
<head>
    <title>Staff Dashboard - Crisis Response</title>
    <a href="/C:/Users/VIVEK/OneDrive/Desktop/project/public/index.html">
   <button>Go To Guest Page</button>
</a>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>
    <div class="staff-container">
        <header>
            <h1>🚨 Staff Dashboard</h1>
            <div class="staff-info">
                <span id="currentTime"></span>
                <span class="status online">● Live</span>
            </div>
        </header>

        <div class="dashboard-grid">
            <!-- Alert List Section -->
            <div class="alert-section">
                <h2>Incoming Alerts</h2>
                <div class="alert-stats">
                    <div class="stat-box critical">
                        <span id="criticalCount">0</span>
                        <label>Critical</label>
                    </div>
                    <div class="stat-box pending">
                        <span id="pendingCount">0</span>
                        <label>Pending</label>
                    </div>
                    <div class="stat-box resolved">
                        <span id="resolvedCount">0</span>
                        <label>Resolved</label>
                    </div>
                </div>
                <ul id="alertsList"></ul>
            </div>

            <!-- Map Section -->
            <div class="map-section">
                <h2>Live Location Map</h2>
                <div id="map"></div>
            </div>
        </div>

        <!-- Alert Details Modal -->
        <div id="alertModal" class="modal">
            <div class="modal-content">
                <span class="close" onclick="closeModal()">&times;</span>
                <h2>Alert Details</h2>
                <div id="alertDetails"></div>
                <div class="action-buttons">
                    <button class="btn-acknowledge" onclick="acknowledgeAlert()">✓ Acknowledge</button>
                    <button class="btn-resolve" onclick="resolveAlert()">✓ Resolve</button>
                    <button class="btn-dispatch" onclick="dispatchHelp()">🚑 Dispatch Help</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script>
        // Initialize map
        const map = L.map('map').setView([0, 0], 10);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        const markers = {};
        let selectedAlertId = null;
        let alerts = [];

        const socket = io();

        // Debug: Check connection
        socket.on('connect', () => {
            console.log('✅ Connected to server, ID:', socket.id);
        });

        socket.on('connect_error', (err) => {
            console.error('❌ Connection error:', err.message);
        });

        // Play alert sound
        function playAlertSound() {
            const audio = new Audio('data:audio/wav;base64,UklGRl9vT19XQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YU' + 'A'.repeat(100));
            audio.volume = 0.5;
            audio.play().catch(() => {});
        }

        // Update current time
        function updateTime() {
            const now = new Date();
            document.getElementById('currentTime').innerText = 
                now.toLocaleString('en-US', { 
                    weekday: 'short', 
                    month: 'short', 
                    day: 'numeric',
                    hour: '2-digit', 
                    minute: '2-digit',
                    second: '2-digit'
                });
        }
        setInterval(updateTime, 1000);
        updateTime();

        // Receive alerts
        socket.on("receiveAlert", (data) => {
            const alert = {
                id: Date.now(),
                lat: data.lat,
                lng: data.lng,
                timestamp: new Date(),
                status: 'new',
                acknowledged: false,
                resolved: false
            };
            alerts.unshift(alert);
            playAlertSound();
            updateAlertList();
            updateStats();
            addMarker(alert);
        });

        // Add marker to map
        function addMarker(alert) {
            const marker = L.marker([alert.lat, alert.lng])
                .addTo(map)
                .bindPopup(`<b>Emergency!</b><br>Time: ${alert.timestamp.toLocaleTimeString()}`);
            markers[alert.id] = marker;
            map.setView([alert.lat, alert.lng], 15);
        }

        // Update alert list
        function updateAlertList() {
            const list = document.getElementById('alertsList');
            list.innerHTML = alerts.map(alert => `
                <li class="alert-item ${alert.status}" onclick="selectAlert(${alert.id})">
                    <div class="alert-icon">🚨</div>
                    <div class="alert-info">
                        <strong>Emergency Alert</strong>
                        <span>${alert.timestamp.toLocaleTimeString()}</span>
                    </div>
                    <div class="alert-status status-${alert.status}">${alert.status}</div>
                </li>
            `).join('');
        }

        // Update statistics
        function updateStats() {
            document.getElementById('criticalCount').innerText = 
                alerts.filter(a => a.status === 'new').length;
            document.getElementById('pendingCount').innerText = 
                alerts.filter(a => a.status === 'acknowledged').length;
            document.getElementById('resolvedCount').innerText = 
                alerts.filter(a => a.status === 'resolved').length;
        }

        // Select alert
        function selectAlert(id) {
            selectedAlertId = id;
            const alert = alerts.find(a => a.id === id);
            if (alert) {
                document.getElementById('alertDetails').innerHTML = `
                    <p><strong>Location:</strong> ${alert.lat}, ${alert.lng}</p>
                    <p><strong>Time Received:</strong> ${alert.timestamp.toLocaleString()}</p>
                    <p><strong>Status:</strong> ${alert.status.toUpperCase()}</p>
                `;
                document.getElementById('alertModal').style.display = 'block';
                map.setView([alert.lat, alert.lng], 16);
            }
        }

        // Close modal
        function closeModal() {
            document.getElementById('alertModal').style.display = 'none';
        }

        // Action functions
        function acknowledgeAlert() {
            if (selectedAlertId) {
                const alert = alerts.find(a => a.id === selectedAlertId);
                if (alert) {
                    alert.status = 'acknowledged';
                    alert.acknowledged = true;
                    updateAlertList();
                    updateStats();
                    closeModal();
                }
            }
        }

        function resolveAlert() {
            if (selectedAlertId) {
                const alert = alerts.find(a => a.id === selectedAlertId);
                if (alert) {
                    alert.status = 'resolved';
                    alert.resolved = true;
                    updateAlertList();
                    updateStats();
                    closeModal();
                }
            }
        }

        function dispatchHelp() {
            alert('Help dispatched to alert location!');
            acknowledgeAlert();
        }

        // Close modal when clicking outside
        window.onclick = function(event) {
            const modal = document.getElementById('alertModal');
            if (event.target == modal) {
                closeModal();
            }
        }
    </script>
</body>
</html>
